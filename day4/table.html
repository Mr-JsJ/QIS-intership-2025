<!DOCTYPE html>
<html>
    <head>
        <title>Table</title>
    </head>
    <body>
        <table border="1" cellpadding="3" cellspacing="3">
            <!--  to extend the space between cells and spac between text-->
            <tr>
                <th>NAME</th>
                <th>AGE</th>
                <th>MARK</th>
            </tr>
            <tr>
                <td>Nandhu</td>
                <td>23</td>
                <td rowspan="2">NOT ATTENTED</td>
                <!-- rowspan is a attribute to extend row -->
            </tr>
            <tr>
                <td>Omkar</td>
                <td>23</td>
                
            </tr>
            <tr>
                <td>Shejin</td>
                <td>24</td>
                <td>89</td>
            </tr>
            <tr>
                <th colspan="2">TOTAL</th>
                <!-- colspan is a attribute to extend colum -->
                <td>89</td>
            </tr>

        </table>
    </body>
</html>
