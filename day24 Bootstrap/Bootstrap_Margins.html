<!DOCTYPE html>
<html>
    <head>

        <title>MARGIN AND PADDING</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    </head>
<body>
    <!-- space -->

    <div class="mt-4">TOP SPACE</div>
    <div class="mb-3">BOTTOM SPACE</div>
    <div>BOTTOM SPACE</div>
    <div class="ms-4">LEFT SPACE</div>
    <div class="me-5">RIGHT SPACE</div>


    <!-- padding -->



     <div class="p-3">PADDING</div>
     <div class="pt-4">PADDING TOP</div>
     <div class="pb-4">PADDING BOTTOM</div>
     <div class="px-4">PADDING LEFT AND RIGHT</div>
     <div class="ps-4">PADDING RIGHT </div>
     <div class="pe-4">PADDING LEFT</div>
     <div class="py-4">PADDING TOP AND BOTTOM</div>

     <button class="btn btn-primary px-4 py-2">CLICK</button>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script></body>
</html>
