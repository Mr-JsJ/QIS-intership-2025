    <!-- KEY UP -->
     <style>
        #box{
            width: 100px;
            height: 100px;
            background-color: coral;
            text-align: center;
            margin: 10px;
        }
     </style>

    <div id="box">HOVER ME</div>

    <input type="text" id="input" placeholder="TYPE HERE">
    <h4 id="display"></h4>

    <script>
        $(document).ready(function(){
            $("#box").hover(
                function(){$(this).css("background-color","yellow");},
                function(){$(this).css("background-color","coral");}

            );

            $("#input").keyup(function(){
                $("#display").text($(this).val());
            });
        });


document.writeln("<br>===================================================================<br>");

    </script>
<!-- // ======================================================================================================================= -->

<div id="box2" style="width: 100px;height: 100px;background-color: aqua;position: relative;"></div>

<button id="move">MOVE</button>
<button id="moveback">MOVE BACK</button>

<script>
    $(document).ready(function(){
        $("#move").click(function(){
            $("#box2").animate({left:'250px', height:'150px',width:'150px'},1000)
        });

        $("#moveback").click(function(){
            $("#box2").animate({left:'0px', height:'100px',width:'100px'},1000)
        });
    });
   


document.writeln("<br>===================================================================<br>");

</script>

<button id="fadebtn">FADE TO 50%</button>
<button id="fadeBackbtn">FADE BACK</button>

document.writeln("<br>===================================================================<br>");

</script>

<div id="container">
    <p>PARAGRAPH 1</p>
</div>
<button id="add">ADD NEW PARAGRPH</button>
<button id="remove">REMOVE PARAGRPH</button>
<script>
$(document).ready(function(){
    $("#add").click(function(){
        $("#container").append("<p>NEW PARAGRAPH</p>");
    })

    $("#remove").click(function(){
        $("#container p:last").remove();
    })
})



document.writeln("<br>===================================================================<br>");

</script>

<button id="app">append</button>
<button id="pre">perpend</button>
<button id="aft">after</button>
<button id="bef">before</button>
<p id="para6">WELCOME</p>
<script>
    $(document).ready(function(){
        $("#app").click(function(){
            $("#para6").append("hello");

        });
         $("#pre").click(function(){
            $("#para6").prepend("hello");   
        });
         $("#aft").click(function(){
            $("#para6").after("hi");
        });
         $("#bef").click(function(){
            $("#para6").before("hello");
        });
    });



document.writeln("<br>===================================================================<br>");
    
</script>
