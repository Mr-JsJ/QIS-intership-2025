<!DOCTYPE html>
<html>
    <head>

        <title>FORMS AND LABELS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">    </head>
<body>

    <div class="spinner-border"></div>

    <br>

    <div class="spinner-border text-muted"></div>
    <div class="spinner-border text-primary"></div>
    <br>
    <div class="spinner-border text-info"></div>
    <div class="spinner-border text-success"></div>
    <div class="spinner-border text-danger"></div>
    <br>
    <div class="spinner-border text-secondary"></div>
    <div class="spinner-border text-dark"></div>
    <div class="spinner-border text-light"></div>
    <br>
    <div class="spinner-border"></div>

    <br>

    <!-- spinner grow -->
    <div class="spinner-grow"></div>
    <br>
    <div class="spinner-grow text-muted"></div>
    <div class="spinner-grow text-primary"></div>
    <br>
    <div class="spinner-grow text-info"></div>
    <div class="spinner-grow text-success"></div>
    <div class="spinner-grow text-danger"></div>
    <br>
    <div class="spinner-grow text-secondary"></div>
    <div class="spinner-grow text-dark"></div>
    <div class="spinner-grow text-light"></div>
    <br>
    <div class="spinner-grow"></div>
    <br>

    <!-- inside button -->


    <button class="btn btn-primary"><span class="spinner-border"></span>CLICK</button>
    <br>
    <button class="btn btn-primary disabled"><span class="spinner-border spinner-border-sm"></span>CLICK</button>
    <br>
    <button class="btn btn-primary "><span class="spinner-grow"></span>CLICK</button>
    <br>
    <button class="btn btn-primary "><span class="spinner-grow spinner-grow-sm"></span>CLICK</button>
    <br>
    <!-- border -->

    

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script></body>
</html>
