<!DOCTYPE html>
<html>
    <head>

        <title>FORMS AND LABELS</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
        <style>
            span{
                display: inline-block;
                width: 70px;
                height: 70px;
                margin: 6px;
                background-color: bisque;
            }
            .container{
                background-color:aqua ;
            }
        </style>
    </head>
<body>

    <div class="container">
        <h2>BORDER</h2>

        <span class="border border-dark"></span>

        <span class="border-0 border-dark"></span>

        <span class="border-top border-dark"></span>

        <span class="border-bottom border-dark"></span>

        <br>
        <span class="border border-primary"></span>

        <span class="border border-secondary"></span>

        <span class="border border-danger"></span>

        <span class="border border-success"></span>

        <br>
        <span class="rounded"></span>

        <span class="rounded-top"></span>

        <span class="rounded-bottom"></span>

        <span class="rounded-cicle"></span>

        <span class="rounded-0"></span>
    </div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script></body>
</html>
