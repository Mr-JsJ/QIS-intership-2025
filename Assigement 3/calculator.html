<!DOCTYPE html>
<html>
    <head>
        <title>
            CALACULATOR
        </title>
        <link rel="stylesheet" href="calculator.css">
    </head>
    <body>
        


        <div class="card-1">

            <table >
            <tr>
                <td id="display" colspan="4"></td>
            </tr>
            <tr>
                
                <td><button id="clear" onclick="getvalue('clear')">C</button></td>
                <td><button id="number" onclick="getvalue('/')">/</button></td>
                <td><button id="number" onclick="getvalue('*')">*</button></td>
                <td><button id="number" onclick="getvalue('-')">-</button></td>

            </tr>

              <tr>
                <td><button id="number" onclick="getvalue('7')">7</button></td>
                <td><button id="number" onclick="getvalue('8')">8</button></td>
                <td><button id="number" onclick="getvalue('9')">9</button></td>
                <td><button id="number" onclick="getvalue('+')">+</button></td>

            </tr>

              <tr>
                <td><button id="number" onclick="getvalue('4')">4</button></td>
                <td><button id="number" onclick="getvalue('5')">5</button></td>
                <td><button id="number" onclick="getvalue('6')">6</button></td>
                <td><button id="equal" onclick="getvalue('=')">=</button></td>
            </tr>

            <tr>
                <td><button id="number" onclick="getvalue('1')">1</button></td>
                <td><button id="number" onclick="getvalue('2')">2</button></td>
                <td><button id="number" onclick="getvalue('3')">3</button></td>
                <td><button id="number" onclick="getvalue('0')">0</button></td>
            </tr>
        </table>
            
        </div>
        <script src="calculator.js"></script>
    </body>
</html>
