    <body>
        <br>
        <br>

        <script>
            // nested if else
            let num=10;
            if(num>0){
                document.writeln("THE NUMBER IS POSITIVE<br>");
                if(num%2===0){
                    document.writeln("EVEN");
                }else{
                    document.writeln("ODD");
                }
            }
            else{
                document.writeln("THE NUMBER IS NEGATIVE<br>");
            }
        </script>
