<!DOCTYPE html>

<head>
    <title>
        Home page
    </title>
    <link rel="stylesheet" href="css/navbar.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <style>
        .grid img{
    width: 350px;
    height: 250px;
}

.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    justify-content: center;
    margin-top: 30px;
}
    </style>    
</head>



<script>
    function navigateTo(page) {
        if (!page) return;
        window.location.href = page;
    }
</script>


<body>
    <div class="container-fluid">
        <header>
            <div class="navbar">
                <div class="logo">Charity.org</div>
                <div class="row">
                    <div class="col-lg"><a href="Home.html" onclick="navigateTo('Home.html')">Home</a></div>
                    <div class="col-lg"><a href="About.html" onclick="navigateTo('About.html')">About</a></div>
                    <div class="col-lg"><a href="Contact.html" onclick="navigateTo('Contact.html')">Contact</a></div>
                    <div class="col-lg"><a href="Register.html" onclick="navigateTo('Register.html')">Register</a></div>

                </div>
            </div>
        </header>
    </div>

    <div id="carouselExampleIndicators" class="carousel slide">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active"
                aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1"
                aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2"
                aria-label="Slide 3"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="img/edu.jpg" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="img/food.jpg" class="d-block w-100">
            </div>
            <div class="carousel-item">
                <img src="img/med.jpg" class="d-block w-100">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators"
            data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators"
            data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>


    <div class="grid">
        <div class="container text-center">
            <div class="row row-cols-3">
                <div class="col p-4"><img src="img/edu.jpg"></div>
                <div class="col p-4"><img src="img/food.jpg"></div>
                <div class="col p-4"><img src="img/edu.jpg"></div>
                <div class="col p-4"><img src="img/med.jpg"></div>
                <div class="col p-4"><img src="img/edu.jpg"></div>
                <div class="col p-4"><img src="img/food.jpg"></div>
            </div>
        </div>
    </div>






    <div class="container-fluid ">
        <footer class="text-center py-3 bg-light">
            <div> &copy; <span id="currentYear"></span> Charity.org All rights reserved.<span><a
                        href="Home.html">home</a></span></div>
        </footer>
    </div>

    <!-- year -->
    <script>
        (function () {
            var year = document.getElementById('currentYear');
            if (year) year.textContent = new Date().getFullYear();
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
