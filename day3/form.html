<!DOCTYPE html>
<html>

    <head>
        <title>
            Form page
        </title>
    </head>

<body>

<form method="POST"  enctype="multipart/form-data">
<label>Username:</label>
<input type="text" name="username" placeholder="Enter your Username" required><br><br>

<label>Email:</label>
<input type="email" name="email" placeholder="abc@gmail.com" required><br><br>

<label>password:</label>
<input type="password" name="password" value="Password"><br><br>

<label>Gender:</label>
<input type="radio" name="Gender" value="MALE" checked> Male
<input type="radio" name="Gender" value="FEMALE"> Female<br><br>

<label>Hobbies:</label>
  <input type="checkbox" name="Hobbie" value="Reading">Reading
  <input type="checkbox" name="Hobbie" value="Running">Running
  <input type="checkbox" name="Hobbie" value="Coding">Coding<br><br>

<label>Age:</label>
<input type="number" name="age" min="10" max="100"><br><br>

<label>Country:</label>
  <select name="Country">
    <option>India</option>
    <option>USA</option>
    <option>UK</option>
  </select><br><br>

<label>Address:</label>
<textarea name="Address" id="id of address" cols="30" rows="5"></textarea><br><br>

<input type="submit" value="submit">
<input type="reset" value="reset">
</form>

</body>
</html>
